<!doctype html>
<html>
  <head>
    <title>Login</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .container {
        width: 100%;
        max-width: 400px;
        margin: auto;
        padding: 45px 35px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        border-radius: 16px;
        text-align: center;
        box-sizing: border-box;
        animation: fadeIn 0.6s ease-in-out;
      }

      h2 {
        margin-bottom: 25px;
        color: #2c3e50;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      input {
        width: 100%;
        padding: 13px 15px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
        transition: all 0.3s ease;
        font-size: 14px;
        background: #f9fafc;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
      }

      button {
        width: 100%;
        padding: 13px;
        margin-top: 18px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.3px;
        transition: all 0.25s ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      }

      button:active {
        transform: scale(0.97);
      }

      .messages {
        list-style: none;
        padding: 10px;
        margin-bottom: 15px;
        font-size: 14px;
        color: #e74c3c;
        background: #fdecea;
        border-radius: 6px;
      }

      p {
        margin-top: 20px;
        color: #555;
        font-size: 14px;
      }

      a {
        text-decoration: none;
        color: #667eea;
        font-weight: 600;
        transition: color 0.3s ease;
      }

      a:hover {
        color: #764ba2;
        text-decoration: underline;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    {% include 'navbar.html' %}

    <div class="container">
      <h2>Login</h2>

      {% if messages %}
      <div class="messages">
        {% for message in messages %}
        <div>{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit">Login</button>
      </form>

      <p>New user? <a href="/register/">Register</a></p>
    </div>
  </body>
</html>
